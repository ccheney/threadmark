<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Threadmark Side Panel</title>
	<style>
		:root {
			--bg: #f6f6f8;
			--surface: #ffffff;
			--surface-muted: #f0f1f5;
			--surface-raised: #ffffff;
			--text: #202123;
			--muted: #6f7280;
			--border: #dedfea;
			--border-strong: #c8cad8;
			--accent: #10a37f;
			--accent-muted: #e6f5f0;
			--danger: #c9342d;
			--danger-muted: #fff1f0;
			--shadow: 0 14px 32px rgba(32, 33, 35, 0.12);
		}

		body {
			font-family:
				-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
				Arial, sans-serif;
			margin: 0;
			padding: 0;
			background-color: var(--bg);
			color: var(--text);
		}

		button,
		input,
		select {
			font: inherit;
		}

		button {
			color: inherit;
		}

		.header {
			padding: 14px 16px 12px;
			background: var(--surface);
			border-bottom: 1px solid var(--border);
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.header-top {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
		}

		.header h1 {
			margin: 0;
			font-size: 18px;
			font-weight: 700;
			letter-spacing: 0;
		}

		.header-actions {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.icon-button {
			width: 34px;
			height: 34px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 1px solid var(--border);
			border-radius: 8px;
			background: var(--surface-raised);
			cursor: pointer;
		}

		.icon-button:hover,
		.icon-button[aria-expanded="true"] {
			background: var(--surface-muted);
			border-color: var(--border-strong);
		}

		#search-input {
			width: 100%;
			height: 38px;
			margin-top: 12px;
			padding: 0 12px;
			box-sizing: border-box;
			border: 1px solid var(--border-strong);
			border-radius: 8px;
			background: var(--surface-raised);
			color: var(--text);
		}

		#search-input::placeholder {
			color: var(--muted);
		}

		.scope-tabs {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 4px;
			margin-top: 12px;
			padding: 4px;
			border: 1px solid var(--border);
			border-radius: 10px;
			background: var(--surface-muted);
		}

		.scope-tab {
			min-width: 0;
			height: 34px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			border: 0;
			border-radius: 7px;
			background: transparent;
			color: var(--muted);
			cursor: pointer;
			font-size: 13px;
			font-weight: 650;
		}

		.scope-tab.is-active {
			background: var(--surface-raised);
			color: var(--text);
			box-shadow: 0 1px 2px rgba(32, 33, 35, 0.08);
		}

		.scope-count {
			min-width: 18px;
			height: 18px;
			padding: 0 5px;
			border-radius: 999px;
			box-sizing: border-box;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			background: var(--border);
			color: var(--muted);
			font-size: 11px;
			font-weight: 700;
		}

		.scope-tab.is-active .scope-count {
			background: var(--accent-muted);
			color: var(--accent);
		}

		.scope-context {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-top: 10px;
			min-height: 24px;
			color: var(--muted);
			font-size: 12px;
		}

		#scope-heading {
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			color: var(--text);
			font-weight: 650;
		}

		#scope-label {
			flex: 0 0 auto;
		}

		#back-to-current-btn {
			margin-left: auto;
			border: 0;
			background: transparent;
			color: var(--accent);
			cursor: pointer;
			font-size: 12px;
			font-weight: 650;
		}

		.action-row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-top: 10px;
		}

		#show-all-btn {
			height: 32px;
			padding: 0 11px;
			border: 1px solid var(--border);
			border-radius: 8px;
			background: var(--surface-raised);
			cursor: pointer;
			font-size: 12px;
			font-weight: 650;
		}

		#show-all-btn:disabled {
			cursor: default;
			color: var(--muted);
			background: var(--surface-muted);
		}

		.filter-popover,
		#options-panel {
			margin-top: 10px;
			border: 1px solid var(--border);
			border-radius: 10px;
			background: var(--surface-muted);
			box-shadow: var(--shadow);
			overflow: hidden;
		}

		.filter-card,
		.settings-card {
			padding: 12px;
		}

		.filter-title,
		.settings-eyebrow,
		.settings-section-title {
			margin: 0 0 8px;
			color: var(--muted);
			font-size: 11px;
			font-weight: 750;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		#filter-container {
			display: grid;
			gap: 10px;
		}

		.filter-field {
			display: grid;
			gap: 5px;
			font-size: 12px;
			color: var(--muted);
		}

		#filter-date,
		#filter-chat,
		#theme-select {
			width: 100%;
			min-height: 32px;
			box-sizing: border-box;
			border: 1px solid var(--border-strong);
			border-radius: 7px;
			background: var(--surface-raised);
			color: var(--text);
			padding: 0 8px;
		}

		.settings-header h2 {
			margin: 0;
			font-size: 15px;
			line-height: 1.2;
		}

		.settings-copy,
		.setting-description,
		.danger-copy {
			margin: 3px 0 0;
			color: var(--muted);
			font-size: 12px;
			line-height: 1.35;
		}

		.settings-section {
			margin-top: 14px;
		}

		.setting-row {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			align-items: center;
			gap: 12px;
			padding: 10px;
			border: 1px solid var(--border);
			border-radius: 9px;
			background: var(--surface-raised);
		}

		.setting-row + .setting-row {
			margin-top: 8px;
		}

		.setting-title {
			font-size: 13px;
			font-weight: 650;
		}

		.setting-control {
			min-width: 108px;
		}

		.switch {
			position: relative;
			width: 38px;
			height: 22px;
			display: inline-flex;
			align-items: center;
		}

		.switch input {
			position: absolute;
			opacity: 0;
			pointer-events: none;
		}

		.switch-track {
			width: 38px;
			height: 22px;
			border-radius: 999px;
			background: var(--border-strong);
			transition: background 0.15s ease;
		}

		.switch-track::after {
			content: "";
			width: 18px;
			height: 18px;
			position: absolute;
			left: 2px;
			top: 2px;
			border-radius: 999px;
			background: var(--surface-raised);
			box-shadow: 0 1px 3px rgba(32, 33, 35, 0.25);
			transition: transform 0.15s ease;
		}

		.switch input:checked + .switch-track {
			background: var(--accent);
		}

		.switch input:checked + .switch-track::after {
			transform: translateX(16px);
		}

		.switch input:disabled + .switch-track {
			opacity: 0.75;
		}

		.danger-zone {
			margin-top: 14px;
			border: 1px solid rgba(201, 52, 45, 0.35);
			border-radius: 9px;
			background: var(--danger-muted);
		}

		.danger-zone summary {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			align-items: center;
			gap: 12px;
			padding: 10px;
			cursor: pointer;
			list-style: none;
		}

		.danger-zone summary::-webkit-details-marker {
			display: none;
		}

		.danger-chevron {
			width: 8px;
			height: 8px;
			border-right: 2px solid var(--danger);
			border-bottom: 2px solid var(--danger);
			transform: rotate(45deg);
			transition: transform 0.15s ease;
		}

		.danger-zone[open] .danger-chevron {
			transform: rotate(225deg);
		}

		.danger-actions {
			display: grid;
			gap: 8px;
			padding: 0 10px 10px;
		}

		.btn-danger-outline,
		.btn-danger-solid {
			width: 100%;
			min-height: 34px;
			padding: 0 10px;
			border-radius: 8px;
			cursor: pointer;
			font-size: 12px;
			font-weight: 700;
		}

		.btn-danger-outline {
			background: transparent;
			border: 1px solid var(--danger);
			color: var(--danger);
		}

		.btn-danger-solid {
			background: var(--danger);
			border: 1px solid var(--danger);
			color: white;
		}

		#bookmark-list {
			padding: 0;
			margin: 0;
			list-style: none;
		}

		.thread-group-heading {
			padding: 14px 16px 6px;
			color: var(--muted);
			font-size: 11px;
			font-weight: 750;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.bookmark-item {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			gap: 10px;
			padding: 13px 16px;
			border-bottom: 1px solid var(--border);
			background: var(--surface);
			cursor: pointer;
			transition: background 0.12s ease;
		}

		.bookmark-item:hover {
			background: var(--surface-muted);
		}

		.bookmark-text {
			font-size: 14px;
			font-weight: 650;
			line-height: 1.35;
			margin-bottom: 6px;
			display: -webkit-box;
			-webkit-line-clamp: 3;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.bookmark-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 4px;
			margin-bottom: 6px;
		}

		.bookmark-tag {
			background: var(--surface-muted);
			color: var(--text);
			padding: 2px 6px;
			border-radius: 6px;
			font-size: 11px;
			font-weight: 650;
		}

		.bookmark-meta {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			gap: 8px;
			color: var(--muted);
			font-size: 12px;
		}

		.bookmark-thread {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.bookmark-actions {
			display: flex;
			align-items: flex-start;
			gap: 3px;
		}

		.bookmark-icon-btn {
			width: 28px;
			height: 28px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 1px solid transparent;
			border-radius: 7px;
			background: transparent;
			color: var(--muted);
			cursor: pointer;
		}

		.bookmark-icon-btn:hover {
			background: var(--surface-raised);
			border-color: var(--border);
			color: var(--text);
		}

		.delete-btn:hover {
			color: var(--danger);
		}

		.empty-state {
			padding: 42px 22px;
			text-align: center;
			color: var(--muted);
			font-size: 14px;
			line-height: 1.45;
		}

		body.theme-dark {
			--bg: #30313d;
			--surface: #343541;
			--surface-muted: #292a34;
			--surface-raised: #40414f;
			--text: #ececf1;
			--muted: #a7a7b8;
			--border: #565869;
			--border-strong: #6b6d82;
			--accent: #68d8b6;
			--accent-muted: #24483f;
			--danger: #ff6b6b;
			--danger-muted: #3b2428;
			--shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
		}

		.filter-popover[hidden],
		#options-panel[hidden],
		[hidden] {
			display: none;
		}
	</style>
</head>

<body>
	<div class="header">
		<div class="header-top">
			<h1>Threadmark</h1>
			<div class="header-actions">
				<button
					id="filter-toggle-btn"
					class="icon-button"
					type="button"
					title="Filters"
					aria-label="Filters"
					aria-expanded="false"
				>
					<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M4 6h16"></path>
						<path d="M7 12h10"></path>
						<path d="M10 18h4"></path>
					</svg>
				</button>
				<button
					id="options-toggle-btn"
					class="icon-button"
					type="button"
					title="Settings"
					aria-label="Settings"
					aria-expanded="false"
				>
					<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<circle cx="12" cy="12" r="3"></circle>
						<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
					</svg>
				</button>
			</div>
		</div>

		<input
			type="text"
			id="search-input"
			placeholder="Search bookmarks..."
		>

		<div class="scope-tabs" role="tablist" aria-label="Bookmark scope">
			<button
				id="scope-current"
				class="scope-tab is-active"
				type="button"
				role="tab"
				aria-selected="true"
				data-scope="current"
			>
				<span>This chat</span>
				<span id="current-count" class="scope-count">0</span>
			</button>
			<button
				id="scope-library"
				class="scope-tab"
				type="button"
				role="tab"
				aria-selected="false"
				data-scope="library"
			>
				<span>Library</span>
				<span id="library-count" class="scope-count">0</span>
			</button>
		</div>

		<div class="scope-context">
			<span id="scope-label">Current chat</span>
			<strong id="scope-heading">No chat selected</strong>
			<button id="back-to-current-btn" type="button" hidden>Back to this chat</button>
		</div>

		<div id="filter-popover" class="filter-popover" hidden>
			<div class="filter-card">
				<p class="filter-title">Filters</p>
				<div id="filter-container">
					<label class="filter-field">
						Time
						<select id="filter-date">
							<option value="all">All time</option>
							<option value="today">Today</option>
							<option value="7days">Last 7 days</option>
							<option value="30days">Last 30 days</option>
						</select>
					</label>
					<label id="filter-chat-row" class="filter-field">
						Conversation
						<select id="filter-chat">
							<option value="all">All conversations</option>
						</select>
					</label>
				</div>
			</div>
		</div>

		<div class="action-row">
			<button id="show-all-btn" type="button">Highlight all</button>
		</div>

		<div id="options-panel" hidden>
			<div class="settings-card">
				<div class="settings-header">
					<p class="settings-eyebrow">Settings</p>
					<h2>Display and behavior</h2>
					<p class="settings-copy">Keep the panel predictable while ChatGPT pages load and re-render.</p>
				</div>

				<section class="settings-section" aria-labelledby="display-settings-title">
					<h3 id="display-settings-title" class="settings-section-title">Display</h3>
					<label class="setting-row">
						<span>
							<span class="setting-title">Theme</span>
							<span class="setting-description">Match the system, or pin the panel to light or dark.</span>
						</span>
						<span class="setting-control">
							<select id="theme-select">
								<option value="system">System</option>
								<option value="light">Light</option>
								<option value="dark">Dark</option>
							</select>
						</span>
					</label>
					<label class="setting-row">
						<span>
							<span class="setting-title">Auto-highlight</span>
							<span class="setting-description">Saved snippets reappear when the conversation finishes loading.</span>
						</span>
						<span class="switch" aria-label="Auto-highlight on load">
							<input type="checkbox" id="auto-highlight-check">
							<span class="switch-track"></span>
						</span>
					</label>
				</section>

				<details class="danger-zone">
					<summary>
						<span>
							<span class="setting-title">Manage saved data</span>
							<span class="danger-copy">Delete bookmarks for this chat or clear the whole library.</span>
						</span>
						<span class="danger-chevron" aria-hidden="true"></span>
					</summary>
					<div class="danger-actions">
						<button id="purge-btn" class="btn-danger-outline" type="button">
							Delete this chat's bookmarks
						</button>
						<button id="purge-all-btn" class="btn-danger-solid" type="button">
							Delete all bookmarks
						</button>
					</div>
				</details>
			</div>
		</div>
	</div>

	<ul id="bookmark-list">
		<!-- Bookmarks will be injected here -->
	</ul>
	<div id="empty-state" class="empty-state" hidden>
		No bookmarks yet. Select text in ChatGPT to bookmark it.
	</div>

	<script src="sidepanel.js"></script>
</body>

</html>
